	<title>Sketch 020: Image Motion Effect with SVG Filter Demo | Codrops</title>
	<meta name="description" content="An image motion effect with an SVG distortion filter on mouse move." />
	<meta name="keywords" content="image motion, codrops sketch, svg filter" />

<body>
	<main>
		<div class="frame">
			<h1 class="frame__title">Sketch 020: Image Motion Effect with SVG Filter</h1>
			<nav class="frame__links"><a
					href="https://github.com/codrops/codrops-sketches/tree/main/020-image-motion-svg-filter-2">GitHub</a><a
					href="https://tympanus.net/codrops/sketches">Archive</a>
			</nav>
		</div>
		<div class="content">
			<svg id="theSVG" width="100%" height="100%" viewBox="0 0 600 750">
				<filter id="imgFilter">
					<feTurbulence type="turbulence" baseFrequency="0.07" numOctaves="2" seed="2" stitchTiles="stitch"
						x="0%" y="0%" width="100%" height="100%" result="turbulence1" />
					<feDisplacementMap in="SourceGraphic" in2="turbulence1" scale="0" xChannelSelector="R"
						yChannelSelector="B" x="0%" y="0%" width="100%" height="100%" result="displacementMap3" />
				</filter>
				<g>
					<image
						xlink:href="https://imbajrangi.github.io/Company/Projects/NPMDevRun/sketches/020-image-motion-svg-filter-2/img/1.jpg"
						x="150" y="187.5" width="300" height="375" filter="url(#imgFilter)" />
				</g>
			</svg>
		</div>
	</main>
	<script src="https://tympanus.net/codrops/adpacks/cda_sponsor.js"></script>
